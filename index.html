<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Reading Blueprint | Premium Access</title>
    <style>
        :root {
            --primary-blue: #1a365d;
            --whatsapp-green: #25D366;
            --light-bg: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light-bg);
            color: #333;
            text-align: center;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            color: var(--primary-blue);
            font-size: 1.2rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h2 {
            font-size: 2rem;
            margin-top: 0;
            color: #000;
            margin-bottom: 25px;
        }

        /* 9:16 YouTube Embed Container */
        .video-container {
            position: relative;
            width: 100%;
            max-width: 350px; 
            margin: 0 auto 40px auto;
            aspect-ratio: 9 / 16;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            background: #000;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Pricing Grid */
        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .price-card {
            background: #fff;
            padding: 25px 15px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .price-card.featured {
            border: 2px solid var(--primary-blue);
            transform: scale(1.05);
        }

        .price-card h3 {
            margin: 0;
            font-size: 1rem;
            color: #64748b;
            text-transform: uppercase;
        }

        .amount {
            font-size: 1.8rem;
            font-weight: bold;
            margin: 10px 0;
            color: #000;
        }

        .btn-whatsapp {
            display: block;
            background-color: var(--whatsapp-green);
            color: white;
            padding: 12px 10px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.85rem;
            transition: background 0.3s;
        }

        .btn-whatsapp:hover {
            background-color: #1ebe57;
        }

        footer {
            margin-top: 60px;
            padding-bottom: 40px;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        @media (max-width: 600px) {
            .price-card.featured {
                transform: scale(1);
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>A Systematic Guide to Full Fluency</h1>
        <h2>The Reading Blueprint</h2>
    </header>

    <div class="video-container">
        <iframe 
            src="https://www.youtube.com/embed/NboTrZfRhJM?rel=0" 
            title="The Reading Blueprint Video" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>

    <div class="pricing-grid">
        <div class="price-card">
            <h3>Monthly Subscription</h3>
            <span class="amount">₦7,000</span>
            <a href="https://wa.me/YOUR_NUMBER?text=Hello%20Smart%2C%20I%20just%20watched%20the%20video%20and%20I%20want%20to%20subscribe%20to%20the%20Monthly%20Subscription%20for%20The%20Reading%20Blueprint." class="btn-whatsapp">Chat to Buy</a>
        </div>

        <div class="price-card featured">
            <h3>Annual Access</h3>
            <span class="amount">₦50,000</span>
            <a href="https://wa.me/YOUR_NUMBER?text=Hello%20Smart%2C%20I%20just%20watched%20the%20video%20and%20I%27m%20ready%20to%20secure%20the%20Annual%20Subscription%20for%20The%20Reading%20Blueprint." class="btn-whatsapp">Chat to Buy</a>
        </div>

        <div class="price-card">
            <h3>Lifetime Asset</h3>
            <span class="amount">₦85,000</span>
            <a href="https://wa.me/YOUR_NUMBER?text=Hello%20Smart%2C%20I%20want%20the%20Lifetime%20Asset%20package.%20I%27m%20ready%20to%20master%20the%20code%20of%20reading%20forever." class="btn-whatsapp">Chat to Buy</a>
        </div>
    </div>

    <footer>
        &copy; 2026 The Reading Blueprint | Smart Author Studio
    </footer>
</div>

</body>
</html>
